<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>添加/编辑岗位 - 易面</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei','微软雅黑',sans-serif;
  background:#f0f2f5;color:#333;min-height:100vh;
}

/* ── Header ──────────────────────────────────────── */
.app-header{background:#1677ff;height:48px;display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;width:100%}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:24px;flex-shrink:0}
.logo-icon{width:30px;height:30px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1677ff}
.logo-text{color:#fff;font-size:16px;font-weight:600;letter-spacing:.5px}
.header-nav{display:flex;align-items:center}
.nav-item{color:rgba(255,255,255,.82);text-decoration:none;padding:0 12px;height:48px;display:flex;align-items:center;font-size:14px;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-item.active{color:#fff;border-bottom-color:#fff}
.header-right{display:flex;align-items:center;margin-left:auto}
.header-right .nav-item{font-size:13px;padding:0 10px}

/* ── Page ────────────────────────────────────────── */
.page{padding:16px 24px 60px;max-width:1200px;margin:0 auto}
.breadcrumb{font-size:13px;color:#888;margin-bottom:14px}
.breadcrumb a{color:#888;text-decoration:none}
.breadcrumb a:hover{color:#1677ff}
.bc-sep{margin:0 6px;color:#ccc}
.bc-cur{color:#333}

/* ── Card ────────────────────────────────────────── */
.card{background:#fff;border-radius:4px;padding:24px 28px 28px;box-shadow:0 1px 4px rgba(0,0,0,.07);animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid #f0f0f0}



/* ── Form Row ────────────────────────────────────── */
.form-row{display:flex;align-items:flex-start;margin-bottom:20px}
.form-label{width:130px;min-width:130px;text-align:right;padding-right:12px;padding-top:6px;color:#555;font-size:14px;line-height:1.4;flex-shrink:0}
.form-field{flex:1;max-width:660px}

/* ── Input ───────────────────────────────────────── */
.inp{
  width:100%;height:32px;border:1px solid #d9d9d9;border-radius:4px;padding:4px 11px;
  font-size:14px;color:#333;outline:none;background:#fff;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
.inp:hover{border-color:#4096ff}
.inp:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.12)}
.inp.ai-fill{border-color:#a78bfa;box-shadow:0 0 0 2px rgba(139,92,246,.1);background:#fdfcff}

/* ── Title Row ───────────────────────────────────── */
.title-row{display:flex;gap:8px;align-items:center}
.title-row .inp{flex:1}

/* ── AI Generate Button ──────────────────────────── */
.btn-ai{
  display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:32px;border:none;border-radius:4px;
  background:linear-gradient(135deg,#7c5cf5 0%,#9b69fe 100%);
  color:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;
  font-family:inherit;transition:opacity .15s,transform .12s,box-shadow .15s;
  box-shadow:0 2px 6px rgba(124,92,245,.35);
}
.btn-ai:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 12px rgba(124,92,245,.4)}
.btn-ai:active{transform:translateY(0);box-shadow:0 1px 4px rgba(124,92,245,.3)}
.btn-ai:disabled{opacity:.58;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ai .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-ai .star{font-size:13px}

/* ── Textarea ────────────────────────────────────── */
.ta{
  width:100%;min-height:120px;border:1px solid #d9d9d9;border-radius:4px;padding:8px 11px;
  font-size:14px;color:#333;resize:vertical;outline:none;line-height:1.65;
  font-family:inherit;background:#fff;transition:border-color .15s,box-shadow .15s;
}
.ta:hover{border-color:#4096ff}
.ta:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.12)}
.ta.ai-fill{border-color:#a78bfa;box-shadow:0 0 0 2px rgba(139,92,246,.1);background:#fdfcff}
.ta.pulsing{animation:pulse-bg 1.1s ease infinite}
@keyframes pulse-bg{0%,100%{background:#fff}50%{background:#f5f0ff}}

/* ── Field AI Footer ─────────────────────────────── */
.field-footer{display:flex;align-items:center;gap:8px;margin-top:5px;min-height:22px}
.ai-badge{
  display:inline-flex;align-items:center;gap:4px;padding:2px 9px;
  background:#f0ebff;border:1px solid #d4c4f7;border-radius:10px;
  color:#7c3aed;font-size:11px;font-weight:500;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.ai-badge::before{content:'✦';font-size:9px}
.ai-badge.show{opacity:1}
.btn-regen{
  display:inline-flex;align-items:center;gap:3px;padding:2px 9px;
  border:1px solid #d4c4f7;border-radius:10px;background:#fff;
  color:#7c3aed;font-size:11px;cursor:pointer;opacity:0;
  transition:all .18s;font-family:inherit;
}
.btn-regen:hover{background:#f5f0ff;border-color:#b89ef5}
.btn-regen.show{opacity:1}

/* ── Radio Group ─────────────────────────────────── */
.radio-group{display:flex;align-items:center;gap:20px;padding-top:7px;flex-wrap:wrap}
.radio-label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;color:#333;user-select:none}
.radio-label input{accent-color:#1677ff;cursor:pointer}

/* ── Questions ───────────────────────────────────── */
.q-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.q-item{display:flex;align-items:center;gap:6px}
.q-num{color:#666;font-size:14px;min-width:18px;flex-shrink:0}
.q-inp{
  flex:1;height:32px;border:1px solid #d9d9d9;border-radius:4px;padding:4px 11px;
  font-size:13.5px;color:#333;outline:none;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
.q-inp:hover{border-color:#4096ff}
.q-inp:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,.12)}
.q-inp.ai-fill{border-color:#a78bfa;box-shadow:0 0 0 2px rgba(139,92,246,.08)}
.q-label{color:#666;font-size:13px;white-space:nowrap;flex-shrink:0}
.q-count{width:44px;height:32px;border:1px solid #d9d9d9;border-radius:4px;text-align:center;font-size:14px;outline:none;font-family:inherit}
.q-unit{color:#666;font-size:13px;flex-shrink:0}
.icn-btn{
  width:26px;height:26px;border:1px solid #d9d9d9;border-radius:4px;
  background:#fff;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:12px;color:#666;transition:all .12s;flex-shrink:0;
}
.icn-btn:hover{background:#f5f5f5;border-color:#bbb}
.icn-btn.del{color:#ff4d4f;border-color:#ffccc7}
.icn-btn.del:hover{background:#fff1f0;border-color:#ff7875}
.btn-add-q{
  display:inline-flex;align-items:center;gap:4px;padding:0 12px;height:32px;
  border:1px dashed #1677ff;border-radius:4px;background:#fff;color:#1677ff;
  font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s;
}
.btn-add-q:hover{background:#f0f7ff}

/* ── Duration ────────────────────────────────────── */
.dur-row{display:flex;align-items:center;gap:8px}
.dur-inp{width:72px!important}
.dur-unit{color:#666}

/* ── Form Actions ────────────────────────────────── */
.form-actions{display:flex;justify-content:flex-end;gap:10px;padding-top:20px;margin-top:24px;border-top:1px solid #f0f0f0}
.btn{padding:0 20px;height:34px;border-radius:4px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-cancel{border:1px solid #d9d9d9;background:#fff;color:#333}
.btn-cancel:hover{border-color:#1677ff;color:#1677ff}
.btn-save{border:none;background:#1677ff;color:#fff;font-weight:500}
.btn-save:hover{background:#4096ff}
.btn-save:active{background:#0958d9}

/* ── Toast ───────────────────────────────────────── */
.toast{
  position:fixed;bottom:24px;right:24px;background:#fff;border-radius:8px;
  padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,.14);
  display:flex;align-items:center;gap:10px;font-size:13px;color:#333;
  min-width:220px;border-left:3px solid #7c3aed;
  opacity:0;transform:translateY(10px);transition:all .22s;z-index:200;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-left-color:#52c41a}
.toast.error{border-left-color:#ff4d4f}
.toast-ico{font-size:17px;flex-shrink:0}
.toast-msg{flex:1;color:#444;line-height:1.4}
.toast .spin2{width:14px;height:14px;border:2px solid rgba(124,92,245,.25);border-top-color:#7c3aed;border-radius:50%;animation:spin .65s linear infinite;display:inline-block;flex-shrink:0}
</style>
</head>
<body>

<!-- ────────── Header ────────── -->
<header class="app-header">
  <div class="header-inner">
    <a href="#" class="logo">
      <div class="logo-icon">面</div>
      <span class="logo-text">易面</span>
    </a>
    <nav class="header-nav">
      <a href="#" class="nav-item">项目</a>
      <a href="#" class="nav-item">评分表</a>
      <a href="#" class="nav-item">面试题</a>
      <a href="#" class="nav-item active">岗位</a>
      <a href="#" class="nav-item">面试官</a>
      <a href="#" class="nav-item">面试间</a>
    </nav>
    <div class="header-right">
      <a href="#" class="nav-item">组织管理 ›</a>
      <a href="#" class="nav-item">终端入口 ›</a>
      <a href="#" class="nav-item">帮助</a>
      <a href="#" class="nav-item">superadmin ▾</a>
    </div>
  </div>
</header>

<!-- ────────── Main ────────── -->
<main class="page">
  <div class="breadcrumb">
    <a href="#">岗位列表</a>
    <span class="bc-sep">/</span>
    <span class="bc-cur">添加、编辑岗位</span>
  </div>

  <div class="card">
    <div class="card-title">添加/编辑岗位</div>

    <!-- 岗位名称 -->
    <div class="form-row">
      <label class="form-label">岗位名称 (必填)：</label>
      <div class="form-field">
        <div class="title-row">
          <input type="text" class="inp" id="jobTitle" placeholder="请输入岗位名称，例如：高级前端工程师">
          <button class="btn-ai" id="genBtn" onclick="generateAll()">
            <span id="genIco" class="star">✦</span>
            <span id="genTxt">AI 智能生成</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 岗位描述 -->
    <div class="form-row">
      <label class="form-label">岗位描述 (必填)：</label>
      <div class="form-field">
        <textarea class="ta" id="description" rows="5" placeholder="请输入岗位描述，或使用 AI 智能生成"></textarea>
        <div class="field-footer">
          <div class="ai-badge" id="descBadge">AI 生成</div>
          <button class="btn-regen" id="descRegen" onclick="regenField('description')">↺ 重新生成</button>
        </div>
      </div>
    </div>

    <!-- 核心要求 -->
    <div class="form-row">
      <label class="form-label">核心要求 (必填)：</label>
      <div class="form-field">
        <textarea class="ta" id="requirements" rows="5" placeholder="请输入核心要求，或使用 AI 智能生成"></textarea>
        <div class="field-footer">
          <div class="ai-badge" id="reqBadge">AI 生成</div>
          <button class="btn-regen" id="reqRegen" onclick="regenField('requirements')">↺ 重新生成</button>
        </div>
      </div>
    </div>

    <!-- 作答语言 -->
    <div class="form-row">
      <label class="form-label">作答语言 (必填)：</label>
      <div class="form-field">
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="lang" value="普通话"> 普通话</label>
          <label class="radio-label"><input type="radio" name="lang" value="English"> English</label>
          <label class="radio-label"><input type="radio" name="lang" value="粤语"> 粤语</label>
          <label class="radio-label"><input type="radio" name="lang" value="日本語"> 日本語</label>
          <label class="radio-label"><input type="radio" name="lang" value="한국어"> 한국어</label>
          <label class="radio-label"><input type="radio" name="lang" value="不限" checked> 不限</label>
        </div>
      </div>
    </div>

    <!-- 必答题设置 -->
    <div class="form-row">
      <label class="form-label">必答题设置：</label>
      <div class="form-field">
        <div class="q-list" id="qList"></div>
        <button class="btn-add-q" onclick="addQ()">+ 添加必答题</button>
      </div>
    </div>

    <!-- 面试时长 -->
    <div class="form-row">
      <label class="form-label">面试时长 (必填)：</label>
      <div class="form-field">
        <div class="dur-row">
          <input type="number" class="inp dur-inp" id="duration" min="1" max="240" placeholder="">
          <span class="dur-unit">分钟</span>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-cancel">取消</button>
      <button class="btn btn-save" onclick="saveForm()">保存</button>
    </div>
  </div>
</main>

<!-- Toast 通知 -->
<div class="toast" id="toast">
  <span id="toastIco" class="toast-ico">✦</span>
  <span id="toastMsg" class="toast-msg"></span>
</div>

<script>
/* ── State ── */
let questions = [{id:1, content:'', followups:2}];
let nextId = 2;
let aiQGen = false;
let toastTimer = null;

/* ── Render Questions ── */
function renderQ() {
  const list = document.getElementById('qList');
  list.innerHTML = questions.map((q, i) => `
    <div class="q-item" id="qi${q.id}">
      <span class="q-num">${i+1}.</span>
      <input class="q-inp${aiQGen && q.content ? ' ai-fill' : ''}" id="qin${q.id}"
        value="${q.content.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}"
        placeholder="必答题内容，点击编辑"
        onchange="updateQ(${q.id},'content',this.value)">
      <span class="q-label">追问</span>
      <input type="number" class="q-count" id="qf${q.id}" value="${q.followups}" min="0" max="10"
        onchange="updateQ(${q.id},'followups',parseInt(this.value)||0)">
      <span class="q-unit">次</span>
      <button class="icn-btn" onclick="moveQ(${q.id},-1)" title="上移">↑</button>
      <button class="icn-btn" onclick="moveQ(${q.id},1)" title="下移">↓</button>
      <button class="icn-btn del" onclick="removeQ(${q.id})" title="删除">×</button>
    </div>
  `).join('');
}
function updateQ(id, k, v) { const q=questions.find(x=>x.id===id); if(q) q[k]=v; }
function addQ() { questions.push({id:nextId++,content:'',followups:2}); renderQ(); }
function removeQ(id) {
  if(questions.length<=1){toast('至少保留一道必答题','error');return}
  questions=questions.filter(q=>q.id!==id); renderQ();
}
function moveQ(id, dir) {
  const i=questions.findIndex(q=>q.id===id), j=i+dir;
  if(j<0||j>=questions.length) return;
  [questions[i],questions[j]]=[questions[j],questions[i]]; renderQ();
}

/* ── Toast ── */
function toast(msg, type='ai') {
  clearTimeout(toastTimer);
  const t=document.getElementById('toast');
  const ico=document.getElementById('toastIco');
  const m=document.getElementById('toastMsg');
  t.className='toast';
  m.textContent=msg;
  if(type==='loading') {
    ico.outerHTML='<span class="spin2" id="toastIco"></span>';
    t.className='toast show';
  } else {
    const iconMap={error:'✕',success:'✓',ai:'✦'};
    document.getElementById('toastIco').outerHTML=`<span class="toast-ico" id="toastIco">${iconMap[type]||'✦'}</span>`;
    t.className=`toast ${type==='ai'?'':type} show`;
  }
}
function hideToast(delay=2800) { toastTimer=setTimeout(()=>{document.getElementById('toast').classList.remove('show')}, delay); }

/* ── Loading State ── */
function setLoading(on) {
  const btn=document.getElementById('genBtn');
  const ico=document.getElementById('genIco');
  const txt=document.getElementById('genTxt');
  btn.disabled=on;
  ico.className=on?'spin':'star';
  ico.textContent=on?'':' ✦';
  txt.textContent=on?'生成中...':'AI 智能生成';
}

/* ── Typewriter Animation ── */
function typeText(id, text, speed=16) {
  return new Promise(res => {
    const el=document.getElementById(id);
    if(!el){res();return}
    el.value=''; let i=0;
    const iv=setInterval(() => {
      const chunk=Math.floor(Math.random()*5)+2;
      i=Math.min(i+chunk, text.length);
      el.value=text.slice(0,i);
      if(i>=text.length){clearInterval(iv); res();}
    }, speed);
  });
}
function typeQ(qid, text, speed=14) {
  return new Promise(res => {
    const el=document.getElementById('qin'+qid);
    if(!el){res();return}
    el.value=''; let i=0;
    const iv=setInterval(() => {
      const chunk=Math.floor(Math.random()*4)+2;
      i=Math.min(i+chunk, text.length);
      el.value=text.slice(0,i);
      questions.find(q=>q.id===qid) && (questions.find(q=>q.id===qid).content=text.slice(0,i));
      if(i>=text.length){clearInterval(iv); res();}
    }, speed);
  });
}

/* ── Mark AI-filled ── */
function markField(field, on) {
  const badge=document.getElementById(field+'Badge');
  const regen=document.getElementById(field+'Regen');
  const ta=document.getElementById(field);
  if(badge) on?badge.classList.add('show'):badge.classList.remove('show');
  if(regen) on?regen.classList.add('show'):regen.classList.remove('show');
  if(ta) on?ta.classList.add('ai-fill'):ta.classList.remove('ai-fill');
}

/* ── Mock Data ── */
const MOCK = {
  description: '负责公司核心业务系统的前端开发与维护工作，与产品、设计、后端团队紧密协作，推动产品从需求评审到上线全流程落地。承担组件库建设与技术规范制定，提升团队研发效率。参与技术选型与架构设计讨论，持续优化页面性能与用户体验，保障核心链路的稳定性与可访问性。',
  requirements: '1. 本科及以上学历，计算机相关专业，3年以上前端开发经验；\n2. 熟练掌握 Vue 3 / React，理解响应式原理与虚拟 DOM 机制；\n3. 具备良好的工程化意识，熟悉 Vite / Webpack、CI/CD 流程；\n4. 有大型 SPA 或微前端项目落地经验优先；\n5. 具备良好的沟通协作能力，能独立推进跨团队项目。',
  questions: [
    {content: '请介绍一个你主导过的前端性能优化案例，具体做了哪些优化措施，最终效果如何？', followups: 2},
    {content: '在团队协作中，你是如何推动前端技术规范落地的？遇到阻力时你是怎么处理的？', followups: 2},
    {content: '未来 1-2 年你希望在技术或职业方向上有哪些成长？', followups: 1}
  ],
  duration: 30
};

const MOCK_REGEN = {
  description: '主导公司 ToB 产品前端架构设计，负责多端统一组件库的搭建与迭代。与业务团队深度协作，将复杂业务场景转化为高可用的前端解决方案。持续关注前沿技术动态，推动团队在工程化、自动化测试等方向的技术升级，为产品的高质量交付提供保障。',
  requirements: '1. 统招本科及以上，3年以上前端工程师经验；\n2. 深入掌握 JavaScript/TypeScript，熟悉浏览器渲染原理；\n3. 熟练使用主流框架（Vue/React），有组件库开发经验；\n4. 了解服务端渲染（SSR/SSG）方案者优先；\n5. 有良好的文档习惯，擅长技术方案表达与跨团队沟通。'
};

/* ── Fake Delay ── */
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ── Generate All ── */
async function generateAll() {
  const title = document.getElementById('jobTitle').value.trim();
  if(!title) { toast('请先输入岗位名称','error'); hideToast(2400); return; }

  setLoading(true);
  toast('正在 AI 生成岗位内容，请稍候…','loading');

  const descTA = document.getElementById('description');
  const reqTA = document.getElementById('requirements');
  descTA.classList.add('pulsing');
  reqTA.classList.add('pulsing');

  await delay(900);
  descTA.classList.remove('pulsing');
  reqTA.classList.remove('pulsing');

  toast('正在填写岗位描述…','ai');
  await typeText('description', MOCK.description);
  markField('description', true);

  toast('正在填写核心要求…','ai');
  await typeText('requirements', MOCK.requirements);
  markField('requirements', true);

  toast('正在生成面试题目…','ai');
  questions = MOCK.questions.map((q, i) => ({id:i+1, content:'', followups:q.followups||2}));
  nextId = questions.length + 1;
  aiQGen = true;
  renderQ();
  for(let i=0; i<MOCK.questions.length; i++) {
    await typeQ(questions[i].id, MOCK.questions[i].content);
    questions[i].content = MOCK.questions[i].content;
  }

  document.getElementById('duration').value = MOCK.duration;

  toast('内容已生成完成，可继续编辑后保存','success');
  hideToast(3200);
  setLoading(false);
}

/* ── Regenerate Single Field ── */
async function regenField(field) {
  const label = field==='description' ? '岗位描述' : '核心要求';
  const ta = document.getElementById(field);
  ta.classList.add('pulsing');
  toast(`正在重新生成${label}…`, 'loading');
  await delay(700);
  ta.classList.remove('pulsing');
  await typeText(field, MOCK_REGEN[field] || '');
  markField(field, true);
  toast(`${label}已更新`, 'success');
  hideToast(2500);
}

/* ── Save ── */
function saveForm() {
  const t = document.getElementById('jobTitle').value.trim();
  const d = document.getElementById('description').value.trim();
  const r = document.getElementById('requirements').value.trim();
  const dur = document.getElementById('duration').value.trim();
  if(!t||!d||!r||!dur) { toast('请填写所有必填字段','error'); hideToast(2500); return; }
  toast('岗位信息已保存','success');
  hideToast(2800);
}

/* ── Init ── */
renderQ();
</script>
</body>
